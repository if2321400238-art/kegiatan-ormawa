services:

  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: kegiatan-app

    working_dir: /var/www/html

    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306

      DB_DATABASE: ${DB_DATABASE:-ormawa_db}

      DB_USERNAME: ${DB_USERNAME:-root}

      DB_PASSWORD: ${DB_PASSWORD:-}

      RUN_MIGRATIONS: "true"

    volumes:
      - .:/var/www/html

      - vendor_data:/var/www/html/vendor

      - node_modules:/var/www/html/node_modules

    depends_on:
      mysql:
        condition: service_healthy

    restart: unless-stopped


  nginx:

    image: nginx:1.28-alpine

    container_name: kegiatan-nginx

    ports:
      - "${APP_PORT:-8000}:80"

    volumes:
      - .:/var/www/html

      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

    depends_on:
      - app

    restart: unless-stopped


  mysql:

    image: mysql:8.4

    container_name: kegiatan-mysql

    ports:
      - "${MYSQL_PORT:-3307}:3306"

    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-ormawa_db}

      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:

      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot --silent"
        ]

      interval: 10s

      timeout: 5s

      retries: 10

      start_period: 30s

    restart: unless-stopped


volumes:

  mysql_data:

  vendor_data:

  node_modules: