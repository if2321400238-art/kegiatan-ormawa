services:

  app:
    build:
      context: .
      dockerfile: Dockerfile production
    container_name: kegiatan-app
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - .env
    environment:
      APP_KEY: ${APP_KEY:?APP_KEY must be set in .env}
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-ormawa_db}
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-}
      UNUJA_API_BASE_URL: ${UNUJA_API_BASE_URL:-https://v2-api.unuja.ac.id}
      UNUJA_API_LOGIN_URL: ${UNUJA_API_LOGIN_URL:-https://v2-api.unuja.ac.id/log/masuk}
      UNUJA_API_USERNAME: ${UNUJA_API_USERNAME:-}
      UNUJA_API_PASSWORD: ${UNUJA_API_PASSWORD:-}
      UNUJA_API_KEY_HEADER: ${UNUJA_API_KEY_HEADER:-unujasimptapikey}
      UNUJA_API_TIMEOUT: ${UNUJA_API_TIMEOUT:-10}
      UNUJA_API_CONNECT_TIMEOUT: ${UNUJA_API_CONNECT_TIMEOUT:-3}
      CACHE_STORE: ${CACHE_STORE:-file}
      SESSION_DRIVER: ${SESSION_DRIVER:-file}
      RUN_MIGRATIONS: "true"
    # Port 5173 dicopot total. Volume lokal dicopot agar container mandiri & secure.
    volumes:
      - storage_data:/var/www/html/storage
    dns:
      - 1.1.1.1
      - 8.8.8.8
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    build:
      context: .
      dockerfile: Dockerfile production
      target: nginx
    container_name: kegiatan-nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:${APP_PORT:-8000}:80"
    volumes:
      # File konfigurasi nginx production kamu
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    depends_on:
      - app


  mysql:
    image: mysql:8.4
    container_name: kegiatan-mysql
    command:
      - --max-connections=50
      - --innodb-buffer-pool-size=64M
      - --performance-schema=OFF
      - --table-open-cache=400
      - --skip-name-resolve
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3307}:3306" # Hanya bisa diakses dari localhost server demi keamanan
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-ormawa_db}
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - mysql_data:/var/lib/mysql
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s


volumes:
  mysql_data:
  storage_data:   # Untuk menyimpan file upload agar tidak hilang saat container update
