# (Opsional) Boleh dihapus untuk dev karena tidak ada reverse proxy eksternal
# set_real_ip_from 172.16.0.0/12;
# real_ip_header X-Forwarded-For;
# real_ip_recursive on;

# DIMATIKAN UNTUK DEV: Menghindari error 429 Too Many Requests saat live-reload
# limit_req_zone $binary_remote_addr zone=dynamic_requests:10m rate=10r/s;

server {
    listen 80;
    access_log /dev/stdout;
    error_log /dev/stderr warn;

    server_name localhost;
    root /var/www/html/public;
    index index.php index.html;
    charset utf-8;

    # Diperbesar sedikit untuk memudahkan testing upload file besar
    client_max_body_size 100m;
    error_page 413 /errors/upload-too-large.html;

    # Blokir bot dihilangkan sementara (tidak terlalu relevan di local dev)

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        # DIMATIKAN UNTUK DEV:
        # limit_req zone=dynamic_requests burst=20 nodelay;
        # limit_req_status 429;

        include fastcgi_params;
        fastcgi_pass app:9000;

        fastcgi_connect_timeout 3s;

        # DIPERPANJANG UNTUK DEV: 300 detik.
        # Sangat penting jika kamu menggunakan Xdebug agar Nginx tidak timeout.
        fastcgi_send_timeout 300s;
        fastcgi_read_timeout 300s;

        fastcgi_index index.php;

        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        # Header proxy dimatikan/disederhanakan untuk local
        # fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        # fastcgi_param HTTP_X_FORWARDED_HOST $http_host;
        # fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
