# Restore the original client address supplied by the host reverse proxy so
# per-client rate limits do not treat every visitor as the Docker gateway.
set_real_ip_from 172.16.0.0/12;
real_ip_header X-Forwarded-For;
real_ip_recursive on;

limit_req_zone $binary_remote_addr zone=dynamic_requests:10m rate=10r/s;

server {

    listen 80;
    access_log /dev/stdout;
    error_log /dev/stderr warn;


    server_name localhost;

    root /var/www/html/public;

    index index.php index.html;

    charset utf-8;

    client_max_body_size 32m;
    error_page 413 /errors/upload-too-large.html;


    # Drop known bot/probe flood before it reaches PHP-FPM.
    # This prevents random internet POST storms from exhausting FPM workers.
    location = /uvs/launcher {
        access_log off;
        log_not_found off;
        return 204;
    }

    location = /uvs/launcher/ {
        access_log off;
        log_not_found off;
        return 204;
    }

    location / {

        try_files $uri $uri/ /index.php?$query_string;

    }


    location ~ \.php$ {

        limit_req zone=dynamic_requests burst=20 nodelay;
        limit_req_status 429;

        include fastcgi_params;

        fastcgi_pass app:9000;

        fastcgi_connect_timeout 3s;
        fastcgi_send_timeout 30s;
        fastcgi_read_timeout 30s;

        fastcgi_index index.php;

        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_HOST $host;
        fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;

    }


    location ~ /\.(?!well-known).* {

        deny all;

    }

}
