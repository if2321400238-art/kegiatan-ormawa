services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kegiatan-app-dev
    restart: unless-stopped
    working_dir: /var/www/html
    entrypoint: []
    command: >
      sh -c "composer install --prefer-dist --no-interaction
      && mkdir -p storage/framework/cache/data storage/framework/views storage/framework/sessions storage/logs bootstrap/cache
      && php artisan storage:link --force
      && php artisan view:clear
      && php-fpm"
    environment:
      APP_ENV: local
      APP_URL: http://localhost:${APP_PORT:-8000}
      SESSION_SECURE_COOKIE: "false"
      APP_DEBUG: "true"
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-ormawa_db}
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-}
      UNUJA_API_BASE_URL: ${UNUJA_API_BASE_URL:-https://v2-api.unuja.ac.id}
      UNUJA_API_LOGIN_URL: ${UNUJA_API_LOGIN_URL:-https://v2-api.unuja.ac.id/log/masuk}
      UNUJA_API_USERNAME: ${UNUJA_API_USERNAME:-}
      UNUJA_API_PASSWORD: ${UNUJA_API_PASSWORD:-}
      UNUJA_API_KEY_HEADER: ${UNUJA_API_KEY_HEADER:-unujasimptapikey}
      UNUJA_API_TIMEOUT: ${UNUJA_API_TIMEOUT:-30}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-false}
    volumes:
      - .:/var/www/html
      - vendor_dev:/var/www/html/vendor
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:1.28-alpine
    container_name: kegiatan-nginx-dev
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  vite:
    image: node:22-bookworm-slim
    container_name: kegiatan-vite-dev
    restart: unless-stopped
    working_dir: /var/www/html
    ports:
      - "${VITE_PORT:-5173}:5173"
    volumes:
      - .:/var/www/html
      - node_modules_dev:/var/www/html/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - app

  mysql:
    image: mysql:8.4
    container_name: kegiatan-mysql-dev
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-ormawa_db}
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - mysql_dev_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql_dev_data:
  vendor_dev:
  node_modules_dev:
