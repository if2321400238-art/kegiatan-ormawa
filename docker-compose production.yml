services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kegiatan-app
    restart: always
    working_dir: /var/www/html
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-ormawa_db}
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-}
      UNUJA_API_BASE_URL: ${UNUJA_API_BASE_URL:-https://v2-api.unuja.ac.id}
      UNUJA_API_LOGIN_URL: ${UNUJA_API_LOGIN_URL:-https://v2-api.unuja.ac.id/log/masuk}
      UNUJA_API_USERNAME: ${UNUJA_API_USERNAME:-}
      UNUJA_API_PASSWORD: ${UNUJA_API_PASSWORD:-}
      UNUJA_API_KEY_HEADER: ${UNUJA_API_KEY_HEADER:-unujasimptapikey}
      UNUJA_API_TIMEOUT: ${UNUJA_API_TIMEOUT:-10}
      RUN_MIGRATIONS: "true"
    # Port 5173 dicopot total. Volume lokal dicopot agar container mandiri & secure.
    volumes:
      - storage_data:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:1.28-alpine
    container_name: kegiatan-nginx
    restart: always
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      # Nginx mengambil aset statis (CSS/JS) langsung dari image app melalui volume bersama
      - assets_data:/var/www/html/public
      # File konfigurasi nginx production kamu
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  mysql:
    image: mysql:8.4
    container_name: kegiatan-mysql
    restart: always
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3307}:3306" # Hanya bisa diakses dari localhost server demi keamanan
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-ormawa_db}
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql_data:
  storage_data:   # Untuk menyimpan file upload agar tidak hilang saat container update
  assets_data:    # Menghubungkan public asset antara App dan Nginx
