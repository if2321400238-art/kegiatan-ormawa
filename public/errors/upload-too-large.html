<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>File terlalu besar</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#F4F6FB;font-family:Inter,system-ui,-apple-system,sans-serif;color:#111827}
    .card{width:min(92vw,520px);background:#fff;border:1px solid #E5E7EB;border-radius:14px;padding:32px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06)}
    .code{font-size:12px;font-weight:700;letter-spacing:.08em;color:#6B7280;text-transform:uppercase}.title{font-size:22px;font-weight:800;margin:10px 0}.msg{font-size:14px;line-height:1.7;color:#4B5563}.btn{display:inline-block;margin-top:22px;padding:10px 16px;border-radius:10px;background:#1E3A6E;color:#fff;text-decoration:none;font-size:14px;font-weight:700}
  </style>
</head>
<body>
  <main class="card">
    <div class="code">413</div>
    <h1 class="title">File yang diunggah terlalu besar</h1>
    <p class="msg">Dokumen LPJ maksimal 10 MB, lampiran maksimal 5 MB per file, dan total unggahan satu kali submit maksimal 32 MB. Kurangi ukuran file lalu coba lagi.</p>
    <a class="btn" href="javascript:history.back()">Kembali ke form</a>
  </main>
</body>
</html>
